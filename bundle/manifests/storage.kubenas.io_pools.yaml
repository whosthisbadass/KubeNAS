apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: pools.storage.kubenas.io
spec:
  group: storage.kubenas.io
  names:
    kind: Pool
    listKind: PoolList
    plural: pools
    singular: pool
  scope: Namespaced
  versions:
    - name: v1alpha1
      served: true
      storage: true
      schema:
        openAPIV3Schema:
          type: object
          properties:
            apiVersion: { type: string }
            kind: { type: string }
            metadata: { type: object }
            spec:
              type: object
              required: [arrayRef, mountPoint]
              properties:
                arrayRef: { type: string }
                mountPoint: { type: string }
                mergerfs:
                  type: object
                  properties:
                    categoryCreate: { type: string }
                    minFreeSpace: { type: string }
            status:
              type: object
              properties:
                phase: { type: string }
                mounted: { type: boolean }
      subresources:
        status: {}
