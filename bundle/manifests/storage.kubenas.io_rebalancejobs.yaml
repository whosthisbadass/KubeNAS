apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: rebalancejobs.storage.kubenas.io
spec:
  group: storage.kubenas.io
  names:
    kind: RebalanceJob
    listKind: RebalanceJobList
    plural: rebalancejobs
    singular: rebalancejob
  scope: Namespaced
  versions:
    - name: v1alpha1
      served: true
      storage: true
      schema:
        openAPIV3Schema:
          type: object
          properties:
            apiVersion: { type: string }
            kind: { type: string }
            metadata: { type: object }
            spec:
              type: object
              required: [poolRef, placementPolicyRef]
              properties:
                poolRef: { type: string }
                placementPolicyRef: { type: string }
                maxConcurrentMoves: { type: integer }
                dryRun: { type: boolean }
            status:
              type: object
              properties:
                phase: { type: string }
                plannedMoves: { type: integer }
                completedMoves: { type: integer }
