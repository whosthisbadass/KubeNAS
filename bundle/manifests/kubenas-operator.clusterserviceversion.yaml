apiVersion: operators.coreos.com/v1alpha1
kind: ClusterServiceVersion
metadata:
  name: kubenas-operator.v0.1.0
  namespace: kubenas-system
  annotations:
    # OperatorHub metadata.
    alm-examples: |-
      [
        {
          "apiVersion": "storage.kubenas.io/v1alpha1",
          "kind": "Disk",
          "metadata": {"name": "disk1"},
          "spec": {
            "nodeName": "snode-1",
            "devicePath": "/dev/sdb",
            "filesystem": "xfs",
            "mountPoint": "/mnt/disks/disk1",
            "role": "data"
          }
        },
        {
          "apiVersion": "storage.kubenas.io/v1alpha1",
          "kind": "Array",
          "metadata": {"name": "media-array", "namespace": "kubenas-system"},
          "spec": {
            "dataDisks": ["disk1", "disk2"],
            "parityDisks": ["parity1"]
          }
        },
        {
          "apiVersion": "storage.kubenas.io/v1alpha1",
          "kind": "Pool",
          "metadata": {"name": "main-pool", "namespace": "kubenas-system"},
          "spec": {
            "arrayRef": "media-array",
            "mountPoint": "/mnt/pool"
          }
        }
      ]
    capabilities: Basic Install
    categories: Storage
    containerImage: ghcr.io/kubenas/operator:v0.1.0
    createdAt: "2026-01-01T00:00:00Z"
    description: >
      KubeNAS is a Kubernetes-native NAS platform providing Unraid-style
      disk arrays, SnapRAID parity, mergerfs pooling, SMB/NFS shares,
      and automated disk health management for homelab and edge clusters.
    repository: https://github.com/kubenas/kubenas
    support: KubeNAS Community
spec:
  displayName: KubeNAS Operator
  description: |
    ## Overview
    KubeNAS is a Kubernetes-native NAS platform for homelab and edge environments.

    ## Features
    - Unraid-style disk arrays with independent per-disk XFS filesystems
    - SnapRAID parity protection with automated sync/check/scrub scheduling
    - mergerfs union filesystem pooling
    - SMB/NFS network shares with Kubernetes RBAC-based authorization
    - SSD/NVMe cache tiers (CachePool)
    - Automatic disk failure detection and recovery via DiskFailure CRD
    - Intelligent file placement with configurable PlacementPolicy

    ## Requirements
    - OpenShift 4.x / OKD or Kubernetes 1.26+
    - Node packages: smartmontools, mergerfs, snapraid, samba, nfs-utils
    - Fedora CoreOS: rpm-ostree install smartmontools mergerfs snapraid

  version: 0.1.0
  maturity: alpha
  minKubeVersion: "1.26.0"

  keywords:
    - NAS
    - storage
    - homelab
    - mergerfs
    - snapraid
    - samba
    - nfs

  maintainers:
    - name: KubeNAS Community
      email: maintainers@kubenas.io

  provider:
    name: KubeNAS Community
    url: https://github.com/kubenas/kubenas

  links:
    - name: Documentation
      url: https://github.com/kubenas/kubenas/tree/main/docs
    - name: Source Code
      url: https://github.com/kubenas/kubenas

  icon:
    - base64data: ""
      mediatype: image/svg+xml

  installModes:
    - type: OwnNamespace
      supported: true
    - type: SingleNamespace
      supported: true
    - type: MultiNamespace
      supported: false
    - type: AllNamespaces
      supported: false

  install:
    strategy: deployment
    spec:
      clusterPermissions:
        - serviceAccountName: kubenas-operator
          rules:
            - apiGroups: ["storage.kubenas.io"]
              resources:
                - disks
                - disks/status
                - disks/finalizers
                - arrays
                - arrays/status
                - pools
                - pools/status
                - shares
                - shares/status
                - parityschedules
                - parityschedules/status
                - placementpolicies
                - rebalancejobs
                - rebalancejobs/status
                - diskfailures
                - diskfailures/status
                - cachepools
                - cachepools/status
              verbs: ["*"]
            - apiGroups: ["batch"]
              resources: ["cronjobs", "jobs"]
              verbs: ["*"]
            - apiGroups: [""]
              resources: ["configmaps", "pods", "services", "events", "nodes"]
              verbs: ["*"]
            - apiGroups: ["authorization.k8s.io"]
              resources: ["subjectaccessreviews"]
              verbs: ["create"]
            - apiGroups: ["coordination.k8s.io"]
              resources: ["leases"]
              verbs: ["*"]

      deployments:
        - name: kubenas-operator
          spec:
            replicas: 1
            selector:
              matchLabels:
                app.kubernetes.io/name: kubenas-operator
            strategy:
              type: Recreate
            template:
              metadata:
                labels:
                  app.kubernetes.io/name: kubenas-operator
              spec:
                serviceAccountName: kubenas-operator
                securityContext:
                  runAsNonRoot: true
                  runAsUser: 65532
                  seccompProfile:
                    type: RuntimeDefault
                containers:
                  - name: manager
                    image: ghcr.io/kubenas/operator:v0.1.0
                    imagePullPolicy: IfNotPresent
                    args:
                      - --leader-elect=false
                      - --metrics-bind-address=:8080
                      - --health-probe-bind-address=:8081
                    resources:
                      requests:
                        cpu: 50m
                        memory: 64Mi
                      limits:
                        cpu: 500m
                        memory: 256Mi
                    securityContext:
                      allowPrivilegeEscalation: false
                      readOnlyRootFilesystem: true
                      capabilities:
                        drop: ["ALL"]
                    livenessProbe:
                      httpGet:
                        path: /healthz
                        port: 8081
                      initialDelaySeconds: 15
                      periodSeconds: 20
                    readinessProbe:
                      httpGet:
                        path: /readyz
                        port: 8081
                      initialDelaySeconds: 5
                      periodSeconds: 10

  customresourcedefinitions:
    owned:
      - name: disks.storage.kubenas.io
        version: v1alpha1
        kind: Disk
        displayName: Disk
        description: Represents a host block device managed by KubeNAS.
      - name: arrays.storage.kubenas.io
        version: v1alpha1
        kind: Array
        displayName: Array
        description: Defines a NAS array with data and parity disks.
      - name: pools.storage.kubenas.io
        version: v1alpha1
        kind: Pool
        displayName: Pool
        description: Creates a mergerfs union filesystem pool.
      - name: shares.storage.kubenas.io
        version: v1alpha1
        kind: Share
        displayName: Share
        description: Exposes a pool sub-path as an SMB or NFS share.
      - name: parityschedules.storage.kubenas.io
        version: v1alpha1
        kind: ParitySchedule
        displayName: Parity Schedule
        description: Schedules SnapRAID sync, check, and scrub operations.
      - name: placementpolicies.storage.kubenas.io
        version: v1alpha1
        kind: PlacementPolicy
        displayName: Placement Policy
        description: Controls file placement across disks.
      - name: rebalancejobs.storage.kubenas.io
        version: v1alpha1
        kind: RebalanceJob
        displayName: Rebalance Job
        description: Executes data rebalancing across pool disks.
      - name: diskfailures.storage.kubenas.io
        version: v1alpha1
        kind: DiskFailure
        displayName: Disk Failure
        description: Tracks disk failure detection and remediation.
      - name: cachepools.storage.kubenas.io
        version: v1alpha1
        kind: CachePool
        displayName: Cache Pool
        description: Attaches an SSD/NVMe cache tier to a Pool.
