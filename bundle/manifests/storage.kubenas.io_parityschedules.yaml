apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: parityschedules.storage.kubenas.io
spec:
  group: storage.kubenas.io
  names:
    kind: ParitySchedule
    listKind: ParityScheduleList
    plural: parityschedules
    singular: parityschedule
  scope: Namespaced
  versions:
    - name: v1alpha1
      served: true
      storage: true
      schema:
        openAPIV3Schema:
          type: object
          properties:
            apiVersion: { type: string }
            kind: { type: string }
            metadata: { type: object }
            spec:
              type: object
              required: [arrayRef, syncCron, checkCron, scrubCron]
              properties:
                arrayRef: { type: string }
                syncCron: { type: string }
                checkCron: { type: string }
                scrubCron: { type: string }
            status:
              type: object
              properties:
                lastSyncTime: { type: string, format: date-time }
                lastCheckTime: { type: string, format: date-time }
                lastScrubTime: { type: string, format: date-time }
