# ─────────────────────────────────────────────────────────────────
# KubeNAS Node Agent SCC
# Grants the node-agent service account privileged access.
# Required for: disk mounts, /dev access, SnapRAID/mergerfs execution.
# ─────────────────────────────────────────────────────────────────
apiVersion: security.openshift.io/v1
kind: SecurityContextConstraints
metadata:
  name: kubenas-node-agent
  annotations:
    kubernetes.io/description: >
      KubeNAS Node Agent requires privileged access to manage host disk
      devices, mount filesystems, and execute SnapRAID/mergerfs operations.
      Applies only to the node-agent DaemonSet service account.
allowPrivilegedContainer: true
allowHostDirVolumePlugin: true
allowHostIPC: false
allowHostNetwork: true
allowHostPID: false
allowHostPorts: false
allowPrivilegeEscalation: true
allowedCapabilities:
  - SYS_ADMIN
  - DAC_READ_SEARCH
  - MKNOD
defaultAddCapabilities: []
requiredDropCapabilities:
  - KILL
  - NET_BIND_SERVICE
readOnlyRootFilesystem: false
runAsUser:
  type: RunAsAny
seLinuxContext:
  type: RunAsAny
seccompProfiles:
  - '*'
fsGroup:
  type: RunAsAny
supplementalGroups:
  type: RunAsAny
volumes:
  - hostPath
  - emptyDir
  - secret
  - configMap
  - projected
  - downwardAPI
users:
  - system:serviceaccount:kubenas-system:kubenas-node-agent
groups: []
---
# ─────────────────────────────────────────────────────────────────
# KubeNAS Operator SCC
# Operator runs non-root with restricted access (no host disk access needed).
# ─────────────────────────────────────────────────────────────────
apiVersion: security.openshift.io/v1
kind: SecurityContextConstraints
metadata:
  name: kubenas-operator
  annotations:
    kubernetes.io/description: >
      KubeNAS Operator runs non-root and requires only Kubernetes API access
      to manage CRDs and child resources. Uses the restricted-v2 baseline.
allowPrivilegedContainer: false
allowHostDirVolumePlugin: false
allowHostIPC: false
allowHostNetwork: false
allowHostPID: false
allowHostPorts: false
allowPrivilegeEscalation: false
allowedCapabilities: []
defaultAddCapabilities: []
requiredDropCapabilities:
  - ALL
readOnlyRootFilesystem: true
runAsUser:
  type: MustRunAsNonRoot
seLinuxContext:
  type: MustRunAs
  seLinuxOptions:
    type: spc_t
seccompProfiles:
  - runtime/default
fsGroup:
  type: MustRunAs
  ranges:
    - min: 1000
      max: 65535
supplementalGroups:
  type: MustRunAs
  ranges:
    - min: 1000
      max: 65535
volumes:
  - emptyDir
  - secret
  - configMap
  - projected
  - downwardAPI
users:
  - system:serviceaccount:kubenas-system:kubenas-operator
groups: []
