apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: kubenas-node-agent
  namespace: kubenas-system
spec:
  selector:
    matchLabels:
      app: kubenas-node-agent
  template:
    metadata:
      labels:
        app: kubenas-node-agent
    spec:
      hostNetwork: true
      containers:
        - name: agent
          image: ghcr.io/kubenas/node-agent:latest
          securityContext:
            privileged: true
          volumeMounts:
            - name: host-dev
              mountPath: /host/dev
      volumes:
        - name: host-dev
          hostPath:
            path: /dev
