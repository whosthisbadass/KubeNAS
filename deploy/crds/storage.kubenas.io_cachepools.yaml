apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: cachepools.storage.kubenas.io
spec:
  group: storage.kubenas.io
  names:
    kind: CachePool
    listKind: CachePoolList
    plural: cachepools
    singular: cachepool
  scope: Namespaced
  versions:
    - name: v1alpha1
      served: true
      storage: true
      schema:
        openAPIV3Schema:
          type: object
          properties:
            apiVersion: { type: string }
            kind: { type: string }
            metadata: { type: object }
            spec:
              type: object
              required: [poolRef, cacheDisks, mode]
              properties:
                poolRef: { type: string }
                cacheDisks:
                  type: array
                  items: { type: string }
                mode:
                  type: string
                  enum: [write-back, write-through]
                flushPolicy:
                  type: object
                  properties:
                    maxDirtyAge: { type: string }
                    highWatermarkPercent: { type: integer }
            status:
              type: object
              properties:
                phase: { type: string }
