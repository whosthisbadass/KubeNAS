apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: disks.storage.kubenas.io
spec:
  group: storage.kubenas.io
  names:
    kind: Disk
    plural: disks
    singular: disk
  scope: Cluster
  versions:
    - name: v1
      served: true
      storage: true
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              properties:
                device: {type: string}
                size: {type: string}
                rotational: {type: boolean}
                filesystem: {type: string}
                labels:
                  type: object
                  additionalProperties: {type: string}
                health: {type: string}
                state: {type: string}
            status:
              type: object
              properties:
                state: {type: string}
                health: {type: string}
---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: diskclaims.storage.kubenas.io
spec:
  group: storage.kubenas.io
