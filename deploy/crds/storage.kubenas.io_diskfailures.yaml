apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: diskfailures.storage.kubenas.io
spec:
  group: storage.kubenas.io
  names:
    kind: DiskFailure
    listKind: DiskFailureList
    plural: diskfailures
    singular: diskfailure
  scope: Namespaced
  versions:
    - name: v1alpha1
      served: true
      storage: true
      schema:
        openAPIV3Schema:
          type: object
          properties:
            apiVersion: { type: string }
            kind: { type: string }
            metadata: { type: object }
            spec:
              type: object
              required: [diskRef, severity, reason, recommendedAction]
              properties:
                diskRef: { type: string }
                severity:
                  type: string
                  enum: [warning, critical]
                reason: { type: string }
                recommendedAction: { type: string }
                replacementDiskRef: { type: string }
            status:
              type: object
              properties:
                phase: { type: string }
                resolvedAt: { type: string, format: date-time }
