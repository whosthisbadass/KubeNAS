apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: shares.storage.kubenas.io
spec:
  group: storage.kubenas.io
  names:
    kind: Share
    listKind: ShareList
    plural: shares
    singular: share
  scope: Namespaced
  versions:
    - name: v1alpha1
      served: true
      storage: true
      schema:
        openAPIV3Schema:
          type: object
          properties:
            apiVersion: { type: string }
            kind: { type: string }
            metadata: { type: object }
            spec:
              type: object
              required: [poolRef, path, protocol]
              properties:
                poolRef: { type: string }
                path: { type: string }
                protocol:
                  type: string
                  enum: [SMB, NFS]
                authz:
                  type: object
                  description: "Native authorization mapped from OKD/Kubernetes users and groups"
                  properties:
                    mode:
                      type: string
                      enum: [kubernetes-rbac]
                    subjects:
                      type: array
                      items:
                        type: object
                        required: [kind, name, permissions]
                        properties:
                          kind:
                            type: string
                            enum: [User, Group]
                          name:
                            type: string
                          permissions:
                            type: array
                            items:
                              type: string
                              enum: [read, write, admin]
                smb:
                  type: object
                  properties:
                    browseable: { type: boolean }
                    readOnly: { type: boolean }
                nfs:
                  type: object
                  properties:
                    allowedCIDRs:
                      type: array
                      items: { type: string }
                    readOnly: { type: boolean }
            status:
              type: object
              properties:
                phase: { type: string }
                published: { type: boolean }
                effectiveSubjects:
                  type: array
                  items: { type: string }
      subresources:
        status: {}
---
