  scope: Namespaced
  versions:
    - name: v1alpha1
      served: true
      storage: true
      schema:
        openAPIV3Schema:
          type: object
          properties:
            apiVersion: { type: string }
            kind: { type: string }
            metadata: { type: object }
            spec:
              type: object
              required: [arrayRef, mountPoint]
              properties:
                arrayRef: { type: string }
                mountPoint: { type: string }
                mergerfs:
                  type: object
