apiVersion: storage.kubenas.io/v1alpha1
kind: Share
metadata:
  name: media-smb
spec:
  poolRef: main-pool
  path: /media
  protocol: SMB
  authz:
    mode: kubernetes-rbac
    subjects:
      - kind: Group
        name: homelab-media-admins
        permissions: [admin, write, read]
      - kind: Group
        name: homelab-media-readers
        permissions: [read]
      - kind: User
        name: alice
        permissions: [write, read]
  smb:
    browseable: true
    readOnly: false
